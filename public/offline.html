<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne — WimoStock</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f0c61d">
    <link rel="apple-touch-icon" href="/icons/wimo-192x192.png">
    <link rel="shortcut icon" href="/wim.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'DM Sans', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #111;
            border: 1px solid rgba(240,198,29,0.15);
            border-radius: 20px;
            padding: 48px 36px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            animation: fadeUp .5s ease;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .logo {
            width: 72px; height: 72px;
            border-radius: 16px;
            margin: 0 auto 24px;
            display: block;
        }
        .icon-wrap {
            width: 72px; height: 72px;
            background: rgba(240,198,29,0.1);
            border: 1px solid rgba(240,198,29,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.08); }
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        p  { color: rgba(255,255,255,0.5); font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #f0c61d; color: #000;
            border: none; border-radius: 50px;
            padding: 12px 28px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all .2s ease;
        }
        .btn:hover { background: #ffd93d; transform: translateY(-2px); }
        .status-bar {
            position: fixed; top: 16px; right: 16px;
            background: rgba(220,53,69,0.9);
            color: #fff; padding: 6px 14px;
            border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(8px);
            transition: background .3s;
        }
        .status-bar.online { background: rgba(40,167,69,0.9); }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    </style>
</head>
<body>
    <div class="status-bar" id="statusBar">
        <span class="dot"></span>
        <span id="statusText">Hors ligne</span>
    </div>

    <div class="card">
        <img src="/icons/wimo-192x192.png" class="logo" alt="WimoStock" onerror="this.style.display='none'">
        <div class="icon-wrap">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Vérifiez votre connexion internet et réessayez.<br>Les données mises en cache restent accessibles.</p>
        <button class="btn" onclick="retry()">↺ &nbsp;Réessayer</button>
    </div>

    <script>
        function retry() {
            if (navigator.onLine) {
                window.location.href = '/dashboard';
            } else {
                const btn = document.querySelector('.btn');
                btn.textContent = '✗  Toujours hors ligne';
                btn.style.background = '#dc3545';
                btn.style.color = '#fff';
                setTimeout(() => {
                    btn.innerHTML = '↺ &nbsp;Réessayer';
                    btn.style.background = '#f0c61d';
                    btn.style.color = '#000';
                }, 2000);
            }
        }

        function updateStatus() {
            const bar = document.getElementById('statusBar');
            const txt = document.getElementById('statusText');
            if (navigator.onLine) {
                bar.classList.add('online');
                txt.textContent = 'En ligne';
                setTimeout(() => window.location.href = '/dashboard', 1200);
            } else {
                bar.classList.remove('online');
                txt.textContent = 'Hors ligne';
            }
        }

        window.addEventListener('online',  updateStatus);
        window.addEventListener('offline', updateStatus);
        updateStatus();
    </script>
</body>
</html>
